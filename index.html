<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>玄玑 · Astro</title>
<style>
  :root{
    /* 深空神秘风(与PDF报告同源) */
    --bg:#0a0e1f; --card:rgba(255,255,255,.045); --ink:#e8e3f5; --soft:#9a92bd;
    --accent:#c9a8ff; --accent2:#e8c976; --line:rgba(201,168,255,.18); --good:#8fd8b0; --warn:#e0a0b8;
    --gold:#e8c976;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,"PingFang SC",sans-serif;color:var(--ink);padding:20px;line-height:1.7;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.7), transparent),
      radial-gradient(1px 1px at 60% 18%, rgba(255,255,255,.5), transparent),
      radial-gradient(1.5px 1.5px at 80% 40%, rgba(232,201,118,.6), transparent),
      radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,.45), transparent),
      radial-gradient(1px 1px at 75% 75%, rgba(201,168,255,.5), transparent),
      radial-gradient(1.5px 1.5px at 12% 82%, rgba(255,255,255,.5), transparent),
      radial-gradient(900px 600px at 70% -5%, #2a1f4d 0%, transparent 60%),
      radial-gradient(800px 700px at 10% 100%, #1a2148 0%, transparent 55%),
      linear-gradient(160deg,#0a0e1f,#0d1130,#0a0e22);
    background-attachment:fixed;min-height:100vh;
  }
  .wrap{max-width:680px;margin:0 auto}
  h1{font-size:30px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:6px;
     background:linear-gradient(120deg,#e8c976,#fff6d8,#c9a8ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
     text-shadow:0 0 30px rgba(232,201,118,.15)}
  .sub{text-align:center;color:var(--soft);font-size:13px;margin-bottom:22px;letter-spacing:2px}
  .tabs{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
  .tab{padding:7px 18px;border-radius:20px;background:var(--card);color:var(--soft);cursor:pointer;font-size:14px;border:1px solid var(--line);transition:.2s;user-select:none}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(169,143,216,.3)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 22px;margin-bottom:14px;backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,.25)}
  .card h2{font-size:15px;margin-bottom:12px;color:var(--gold);display:flex;align-items:center;gap:6px;letter-spacing:1px}
  .planet{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:15px}
  .planet:last-child{border:0}
  .pname{width:52px;color:var(--soft)}
  .ppos{flex:1;font-weight:500;color:var(--ink)}
  .rx{color:var(--warn);font-size:12px;background:rgba(224,160,184,.15);padding:1px 7px;border-radius:8px}
  .aspects{font-size:13px;color:var(--soft);line-height:2}
  .asp-tag{display:inline-block;padding:2px 9px;border-radius:8px;margin:2px;background:rgba(201,168,255,.12);color:var(--ink)}
  .asp-good{background:rgba(143,216,176,.15);color:var(--good)} .asp-hard{background:rgba(224,160,184,.15);color:var(--warn)}
  .btn{display:block;width:100%;padding:14px;margin-top:12px;border:0;border-radius:12px;background:linear-gradient(120deg,#c9a8ff,#e8c976);color:#1a1530;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 20px rgba(201,168,255,.25)}
  .btn:active{opacity:.8}
  .datebar{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;font-size:13px;color:var(--soft)}
  .datebar input[type=date]{border:1px solid var(--line);border-radius:10px;padding:5px 10px;font-size:14px;color:var(--ink);background:var(--card)}
  .quick{padding:4px 12px;border-radius:14px;background:var(--card);border:1px solid var(--line);cursor:pointer;color:var(--soft);transition:.15s}
  .quick:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .foot{text-align:center;color:var(--soft);font-size:11px;margin-top:20px;opacity:.7;letter-spacing:1px}
  /* —— 我的盘 —— */
  .form-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:14px;flex-wrap:wrap}
  .form-row label{width:72px;color:var(--soft);flex-shrink:0}
  .form-row input,.form-row select{flex:1;min-width:110px;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:14px;color:var(--ink);background:rgba(255,255,255,.06)}
  /* 下拉箭头：与出生时间框用同一个 ▾ 字符，保证大小完全一致 */
  .form-row input::-webkit-calendar-picker-indicator{filter:invert(.7)}
  .form-row option{background:#1a1f3a;color:var(--ink)}
  /* === 出生时间·金色滚轮选择器 === */
  .pill{flex:1;min-width:110px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;color:var(--ink);background:rgba(255,255,255,.06);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
  .pill .ph{color:var(--soft)}
  .pill .chev{color:var(--gold,#e8c976);font-size:12px;flex-shrink:0;margin-left:8px}
  .dt-mask{position:fixed;inset:0;background:rgba(5,7,18,.55);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.25s;z-index:90}
  .dt-mask.on{opacity:1;pointer-events:auto}
  .dt-sheet{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:linear-gradient(180deg,#141833,#0c1024);border-top:1px solid var(--line);border-radius:22px 22px 0 0;padding:14px 16px 26px;transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);z-index:91;box-shadow:0 -10px 40px rgba(0,0,0,.5)}
  .dt-sheet.on{transform:translateY(0)}
  .dt-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .dt-bar .t{font-size:14px;color:var(--gold,#e8c976);letter-spacing:1px}
  .dt-bar button{font-size:14px;cursor:pointer;padding:7px 20px;border-radius:18px;transition:.15s}
  .dt-cancel{color:var(--soft);background:transparent;border:1px solid var(--line)}
  .dt-cancel:active{background:rgba(255,255,255,.05)}
  .dt-ok{color:var(--soft);font-weight:600;background:transparent;border:1px solid var(--line)}
  .dt-ok.ready{color:#1a1530;border:0;background:linear-gradient(120deg,#e8c976,#f3d98c);box-shadow:0 2px 12px rgba(232,201,118,.35)}
  .dt-ok:active{opacity:.85}
  .dt-wheels{display:flex;gap:4px;height:200px;position:relative;overflow:hidden}
  .dt-wheels::before{content:"";position:absolute;left:0;right:0;top:80px;height:40px;border-top:1px solid rgba(201,168,255,.35);border-bottom:1px solid rgba(201,168,255,.35);background:rgba(201,168,255,.07);pointer-events:none;z-index:2;border-radius:8px}
  .dt-col{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;text-align:center}
  .dt-col::-webkit-scrollbar{display:none}
  .dt-col .pad{height:80px}
  .dt-col .it{height:40px;line-height:40px;font-size:17px;color:var(--soft);scroll-snap-align:center;transition:color .15s}
  .dt-col .it.sel{color:var(--ink);font-weight:600;text-shadow:0 0 10px rgba(201,168,255,.4)}
  /* MBTI 4×4 卡片网格 */
  .mbti-sheet{padding-bottom:30px}
  .mbti-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px;max-height:60vh;overflow-y:auto}
  .mbti-cell{border-radius:12px;padding:12px 4px 10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:.15s;user-select:none}
  .mbti-cell .code{font-size:15px;font-weight:700;letter-spacing:.5px;color:#2a2540}
  .mbti-cell .off{font-size:10px;margin-top:2px;color:#5a5570;opacity:.9}
  .mbti-cell .nick{font-size:11.5px;margin-top:1px;color:#3a3550;font-weight:600}
  .mbti-cell.nt{background:rgba(206,184,250,.82)} .mbti-cell.nf{background:rgba(190,224,176,.82)}
  .mbti-cell.st{background:rgba(174,214,232,.82)} .mbti-cell.sp{background:rgba(238,222,160,.85)}
  .mbti-cell.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 4px 14px rgba(232,201,118,.3)}
  .seg{display:flex;gap:8px;flex:1}
  .seg .opt{flex:1;text-align:center;padding:9px;border:1px solid var(--line);border-radius:10px;cursor:pointer;color:var(--soft);user-select:none;transition:.15s}
  .seg .opt.on{background:linear-gradient(120deg,#c9a8ff,#e8c976);color:#1a1530;border-color:transparent;font-weight:600}
  .hint{font-size:12px;color:var(--soft);background:rgba(201,168,255,.08);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:12px;line-height:1.6}
  .latlon{display:none;gap:8px}
  .big3{display:flex;justify-content:space-around;text-align:center;background:linear-gradient(135deg,rgba(201,168,255,.12),rgba(232,201,118,.1));border:1px solid var(--line);border-radius:14px;padding:18px 10px;margin-bottom:8px}
  .big3 .b3{flex:1}
  .big3 .b3 .lbl{font-size:12px;color:var(--soft);margin-bottom:5px}
  .big3 .b3 .val{font-size:17px;font-weight:700;color:var(--gold)}
  .axis{display:flex;flex-wrap:wrap;gap:8px;font-size:13px}
  .axis .ax{background:rgba(201,168,255,.1);border:1px solid var(--line);border-radius:8px;padding:5px 11px;color:var(--ink)}
  .house-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;font-size:13px}
  .house-grid .hc{border-bottom:1px solid var(--line);padding:6px 0;display:flex;gap:8px}
  .house-grid .hc .hn{color:var(--gold);font-weight:600;width:38px}
  .house-grid .hc .hp{color:var(--soft);font-size:12px}
  .role-card{text-align:center;background:linear-gradient(160deg,rgba(42,31,77,.7),rgba(58,47,93,.6));border:1px solid rgba(232,201,118,.3);border-radius:16px;padding:24px 20px;color:#f0ebf8;margin:8px 0;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .role-card .rname{font-size:22px;font-weight:700;color:#e8c976;letter-spacing:2px;margin-bottom:6px;text-shadow:0 0 20px rgba(232,201,118,.3)}
  .role-card .rtype{font-size:13px;color:#c9bce0;margin-bottom:12px;letter-spacing:1px}
  .role-card .rdesc{font-size:15px;line-height:1.9;color:#ded6ee}
  .ask-card{text-align:center;background:linear-gradient(160deg,rgba(232,201,118,.1),rgba(201,168,255,.08));border:1px solid rgba(232,201,118,.35);border-radius:16px;padding:22px 20px;margin-top:18px}
  .ask-card .ask-title{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:1px}
  .ask-card .ask-desc{font-size:13.5px;line-height:1.9;color:var(--soft);margin-bottom:8px}
  .ask-qr{display:flex;align-items:center;justify-content:center;gap:18px;margin:16px 0 6px;flex-wrap:wrap}
  .ask-qr .qr-img{width:175px;border-radius:14px;background:#fff;padding:12px;box-shadow:0 4px 18px rgba(0,0,0,.35)}
  .ask-qr .qr-text{text-align:left;font-size:14px;line-height:1.6;color:var(--gold);font-weight:600;letter-spacing:.5px}
  .ask-qr .qr-text .qr-sub{font-size:11.5px;color:var(--soft);font-weight:400;line-height:1.5;display:inline-block;margin-top:6px}
  .ask-card .ask-or{font-size:12px;color:var(--soft);letter-spacing:3px;margin:12px 0 12px;opacity:.6}
  .read-card{margin-top:18px;padding:20px 18px;border-radius:18px;background:linear-gradient(160deg,rgba(169,143,216,.14),rgba(40,30,70,.25));border:1px solid var(--line);text-align:center}
  .read-card .ask-title{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:1px}
  .read-card .ask-desc{font-size:13.5px;line-height:1.9;color:var(--soft);margin-bottom:14px}
  .read-btn{font-size:15px}
  /* —— 抽卡后分岔双按钮：两条都要拿下·不分主次。左=金色为主，右=紫色为主，色相不同但都亮。
        初始【不发光】(此刻发光的是"分享BUFF")；用户分享完→关掉分享浮层时才给它俩加.glow点亮，引导接着走两条路。 —— */
  .forkbtns{display:flex;gap:11px;margin-top:6px}
  .forkbtns .btn{margin-top:0;flex:1;padding:15px 8px;font-size:14.5px;line-height:1.35;letter-spacing:.5px;font-weight:700!important}
  /* 左·重生人格：金色为主(金多紫少) */
  .forkbtn-reborn{background:linear-gradient(125deg,#ffe6a8,#e8c25a 55%,#c9a8ff)!important;color:#1a1530!important;box-shadow:0 5px 16px rgba(232,201,118,.22)}
  /* 右·人生说明书：紫色为主(紫多金少) */
  .forkbtn-natal{background:linear-gradient(125deg,#c9a8ff,#a888e8 55%,#ffe6a8)!important;color:#1a1530!important;box-shadow:0 5px 16px rgba(201,168,255,.22)}
  /* 点亮后(分享完)：glow 动画接管 box-shadow,呼吸发光。不带 !important,才不会被上面常态 shadow 盖住 */
  .forkbtn-reborn:active,.forkbtn-natal:active{opacity:.85}
  .read-by{font-size:11.5px;color:#ffe6a8;letter-spacing:2px;margin-top:9px;opacity:.85}
  .read-out{margin-top:18px;text-align:left;font-size:14.5px;line-height:1.95;color:var(--text,#e8e4f3);white-space:pre-wrap;word-break:break-word;background:rgba(20,16,38,.5);border-radius:14px;padding:18px 16px;border:1px solid var(--line);min-height:40px}
  .read-out .typing{display:inline-block;width:7px;height:15px;background:var(--gold);margin-left:2px;animation:blink 1s steps(2) infinite;vertical-align:text-bottom}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .read-hook{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);font-size:13px;color:var(--gold);line-height:1.8}
  /* —— 向下引导箭头(柔金呼吸·引导完即收) —— */
  .scroll-guide{display:flex;flex-direction:column;align-items:center;gap:6px;margin:18px 0 2px;cursor:pointer;user-select:none;
    animation:floatArrow 2.6s ease-in-out infinite;transition:opacity .6s ease,transform .6s ease}
  .scroll-guide.fade-out{opacity:0;transform:translateY(6px);pointer-events:none}
  .scroll-guide .sg-word{font-size:12.5px;color:var(--gold);letter-spacing:2px;animation:guideWordGlow 2.8s ease-in-out infinite}
  .scroll-guide .sg-arrow{width:15px;height:15px;border-right:1.5px solid var(--gold);border-bottom:1.5px solid var(--gold);
    transform:rotate(45deg);animation:guideArrowGlow 2.8s ease-in-out infinite}
  @keyframes floatArrow{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
  @keyframes guideWordGlow{0%,100%{opacity:.7;text-shadow:0 0 8px rgba(232,201,118,.2)}50%{opacity:1;text-shadow:0 0 16px rgba(230,200,120,.7),0 0 28px rgba(230,200,120,.35)}}
  @keyframes guideArrowGlow{0%,100%{opacity:.75;filter:drop-shadow(0 0 5px rgba(230,200,120,.4))}50%{opacity:1;filter:drop-shadow(0 0 12px rgba(230,200,120,.85))}}
  /* —— 解读按钮灵气光晕(烛火呼吸·点击即收) —— */
  .read-btn.glow,.btn.glow{animation:glowPulse 2.8s ease-in-out infinite}
  @keyframes glowPulse{
    0%,100%{box-shadow:0 6px 20px rgba(201,168,255,.25),0 0 0 0 rgba(230,200,120,0)}
    50%{box-shadow:0 6px 22px rgba(201,168,255,.3),0 0 22px 4px rgba(230,200,120,.45)}
  }
  /* Markdown 渲染样式(神仙虾解读) */
  .md-body{white-space:normal}
  .md-fadein{animation:mdFade 1.1s ease}
  @keyframes mdFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  /* 世界观总开篇(破局之神觉醒)·钉在解读正文最前·史诗感·与下面个人解读区隔 */
  .prologue{text-align:center;padding:6px 6px 4px;margin-bottom:4px}
  .prologue .md-p{font-size:14px;line-height:2.1;color:#d8cdf0;letter-spacing:.6px;margin:0 0 13px;text-align:center}
  .prologue .md-q{margin:18px auto;padding:14px 16px;max-width:96%;border:0;border-top:1px solid rgba(232,194,90,.3);border-bottom:1px solid rgba(232,194,90,.3);
    font-size:17px;line-height:1.8;color:var(--gold);font-weight:800;letter-spacing:2px;background:none;text-shadow:0 0 16px rgba(255,230,168,.4)}
  .prologue .md-q strong{color:var(--gold)}
  /* 世界观段落里的重点句·金色发光跳出来(用户扫读的抓手) */
  .prologue .md-p strong{color:var(--gold);font-weight:700;text-shadow:0 0 12px rgba(255,230,168,.35)}
  .prologue-div{height:0;border-top:1px dashed rgba(201,168,255,.3);margin:8px 18px 26px;position:relative}
  .prologue-div::after{content:"✦ 你的命书 ✦";position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    background:#0e0b1e;padding:0 14px;font-size:11px;color:var(--gold2,#e8c25a);letter-spacing:3px}
  .md-body .md-h{font-weight:700;color:var(--gold);letter-spacing:.5px;line-height:1.5}
  .md-body .md-h1{font-size:18px;margin:20px 0 10px}
  .md-body .md-h2{font-size:16px;margin:18px 0 9px}
  .md-body .md-h3{font-size:15px;margin:15px 0 8px;color:var(--accent2,#c9b6f0)}
  .md-body .md-h4{font-size:14px;margin:13px 0 7px;color:var(--accent2,#c9b6f0)}
  .md-body .md-p{margin:9px 0;line-height:1.95}
  .md-body strong{color:var(--gold);font-weight:700}
  .md-body em{color:var(--accent2,#c9b6f0);font-style:normal}
  .md-body .md-ul{margin:8px 0;padding-left:20px}
  .md-body .md-ul li{margin:5px 0;line-height:1.85}
  .md-body .md-q{margin:12px 0;padding:10px 14px;border-left:3px solid var(--gold);background:rgba(169,143,216,.1);border-radius:0 8px 8px 0;color:var(--gold);font-size:15px;line-height:1.8}
  .md-body .md-hr{border:none;border-top:1px solid var(--line);margin:16px 0;opacity:.5}
  /* 登录浮层（用现站紫色调变量，与全站统一）*/
  #loginOverlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center}
  #loginOverlay .lg-mask{position:absolute;inset:0;background:rgba(6,8,20,.72);backdrop-filter:blur(3px)}
  #loginOverlay .lg-box{position:relative;width:88%;max-width:340px;background:linear-gradient(160deg,#13152e,#0e1024);border:1px solid var(--line);border-radius:18px;padding:26px 22px 22px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  #loginOverlay .lg-close{position:absolute;top:10px;right:14px;background:none;border:0;color:var(--soft);font-size:22px;cursor:pointer;line-height:1}
  #loginOverlay .lg-title{text-align:center;font-size:20px;font-weight:700;letter-spacing:3px;background:linear-gradient(120deg,#e8c976,#fff6d8,#c9a8ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
  #loginOverlay .lg-sub{text-align:center;font-size:12.5px;color:var(--soft);line-height:1.7;margin-bottom:18px}
  #loginOverlay .lg-input{width:100%;padding:12px 14px;border-radius:11px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:15px;margin-bottom:10px;outline:none}
  #loginOverlay .lg-input:focus{border-color:var(--accent)}
  #loginOverlay .lg-btn{width:100%;padding:12px;border:0;border-radius:11px;background:linear-gradient(120deg,#c9a8ff,#e8c976);color:#1a1530;font-size:15px;font-weight:600;letter-spacing:1px;cursor:pointer}
  #loginOverlay .lg-btn:active{opacity:.85}
  #loginOverlay .lg-btn:disabled{opacity:.55;cursor:default}
  #loginOverlay .lg-hint{font-size:12px;margin-top:8px;text-align:center;min-height:16px;color:var(--soft)}
  #loginOverlay .lg-hint.err{color:var(--warn)} #loginOverlay .lg-hint.wait{color:var(--soft)} #loginOverlay .lg-hint.gold{color:var(--gold)}
  #loginOverlay .lg-back{text-align:center;font-size:12px;color:var(--soft);margin-top:12px;cursor:pointer}
  #loginOverlay .lg-resend{text-align:center;font-size:12.5px;color:#e8c25a;margin-top:12px;cursor:pointer;letter-spacing:.5px;transition:opacity .25s}
  #loginOverlay .lg-resend.disabled{color:var(--soft);opacity:.6;cursor:default}
  #loginOverlay .hidden{display:none}
  /* 右上角账号角标 */

/*  命格卡（cardstage 作用域·全部加前缀防污染） 来自 命格卡_整合.html  */
/* ========================================================== */
.cardstage{--gold:#ffe6a8;--gold2:#e8c25a;--soft:#9a92bd;--accent:#c9a8ff;--line:rgba(201,168,255,.18);
  display:flex;flex-direction:column;align-items:center;}
.cardstage .ctop{text-align:center;margin-bottom:20px;max-width:340px}
.cardstage .ctop .rebirth{font-size:23px;font-weight:800;letter-spacing:1px;line-height:1.45;
  background:linear-gradient(135deg,#fff4d6,#ffe6a8,#e8c25a);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;filter:drop-shadow(0 0 16px rgba(255,230,168,.45));}
/* —— 换卡进度点（两人格） —— */
.cardstage .pager{display:flex;gap:9px;justify-content:center;margin-bottom:16px}
.cardstage .pager .dot{width:7px;height:7px;border-radius:50%;background:rgba(201,168,255,.3);transition:.3s}
.cardstage .pager .dot.on{background:var(--gold);width:22px;border-radius:4px;box-shadow:0 0 10px rgba(255,230,168,.6)}
/* ===== 命格卡（可翻面：正=美图 / 背=太极封皮） ===== */
.cardstage .stage{width:100%;max-width:340px;position:relative}
/* —— 翻开提醒：纯金色光环呼吸 —— */
.cardstage .tap-hint{position:absolute;left:50%;bottom:13%;z-index:30;pointer-events:none;
  transform:translateX(-50%);transition:opacity .4s ease;text-align:center}
.cardstage .stage.opened .tap-hint{opacity:0}
.cardstage .tap-hint .core{position:relative;width:14px;height:14px;margin:0 auto 14px;border-radius:50%;
  background:radial-gradient(circle,#fff6d8,var(--gold) 60%,transparent);
  box-shadow:0 0 16px 4px rgba(255,230,168,.7);animation:cardCoreBreath 2s ease-in-out infinite}
@keyframes cardCoreBreath{0%,100%{transform:scale(.85);opacity:.85}50%{transform:scale(1.15);opacity:1}}
.cardstage .tap-hint .core::before,.cardstage .tap-hint .core::after{content:"";position:absolute;left:50%;top:50%;
  width:14px;height:14px;margin:-7px 0 0 -7px;border-radius:50%;
  border:1.5px solid rgba(255,230,168,.6);animation:cardTapRipple 2s ease-out infinite}
.cardstage .tap-hint .core::after{animation-delay:1s}
@keyframes cardTapRipple{0%{transform:scale(1);opacity:.7}100%{transform:scale(4.5);opacity:0}}
.cardstage .tap-hint .tword{font-size:12.5px;color:var(--gold);letter-spacing:4px;font-weight:600;
  text-shadow:0 1px 10px rgba(0,0,0,.95),0 0 14px rgba(255,230,168,.5);
  animation:cardTapWord 2s ease-in-out infinite}
@keyframes cardTapWord{0%,100%{opacity:.6}50%{opacity:1}}
.cardstage .flip{perspective:1500px;width:100%;cursor:pointer}
.cardstage .flip-inner{position:relative;width:100%;transition:transform .8s cubic-bezier(.2,.8,.2,1),opacity .3s ease;transform-style:preserve-3d}
.cardstage .flip.opened .flip-inner{transform:rotateY(180deg)}
.cardstage .flip.swap .flip-inner{opacity:0;transform:scale(.96)}
.cardstage .face{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;overflow:hidden;
  border:1px solid rgba(232,201,118,.3);box-shadow:0 20px 64px rgba(0,0,0,.6)}
/* —— 正面：美图（收藏面） —— */
.cardstage .face.front{position:absolute;inset:0;transform:rotateY(180deg)}
.cardstage .front .photo{display:block;width:100%;height:auto;vertical-align:top}
.cardstage .front .frame{position:absolute;inset:8px;border:1px solid rgba(232,201,118,.4);border-radius:14px;z-index:3;pointer-events:none}
.cardstage .front .tag{position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:4;font-size:11px;color:var(--gold);
  letter-spacing:4px;text-shadow:0 1px 10px rgba(0,0,0,.95)}
.cardstage .front .overlay{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:54px 18px 22px;
  display:flex;flex-direction:column;align-items:center;

.cardstage .front .ptype{font-size:40px;font-weight:800;letter-spacing:6px;line-height:1;
  background:linear-gradient(135deg,#fff4d6,#ffe6a8,#e8c25a);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;filter:drop-shadow(0 0 16px rgba(255,230,168,.6))}
.cardstage .front .nameline{margin-top:12px}

/* —— 太极封皮（盖着） —— */
.cardstage .face.back{position:relative}
.cardstage .back .bimg{display:block;width:100%;height:auto;vertical-align:top}
.cardstage .back .frame{position:absolute;inset:9px;border:1px solid rgba(232,201,118,.4);border-radius:14px;z-index:3;pointer-events:none}
.cardstage .back::before{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(1.5px 1.5px at 16% 10%,rgba(255,230,168,.7),transparent),
    radial-gradient(1px 1px at 82% 14%,rgba(255,255,255,.55),transparent)}
.cardstage .back .bbrand{position:absolute;bottom:20px;left:0;right:0;z-index:4;
  display:flex;align-items:center;justify-content:center;gap:14px}
.cardstage .back .bbrand .txt{font-size:12px;color:var(--gold);letter-spacing:5px;flex:none;
  text-shadow:0 1px 10px rgba(0,0,0,.9),0 0 14px rgba(255,230,168,.4)}
.cardstage .back .bbrand .gem{width:7px;height:7px;background:linear-gradient(135deg,#fff6d8,var(--gold));
  transform:rotate(45deg);box-shadow:0 0 12px rgba(255,230,168,.9);flex-shrink:0}
/* ===== 卡下信息区（翻开后出现） ===== */
.cardstage .cinfo{width:100%;max-width:340px;overflow:hidden;
  max-height:0;opacity:0;margin-top:0;
  transition:max-height .5s ease,opacity .4s ease,margin-top .5s ease}
.cardstage .cinfo.show{max-height:360px;opacity:1;margin-top:14px}
.cardstage .cinfo .say{font-size:16px;line-height:1.8;color:var(--gold);text-align:center;letter-spacing:.4px;font-weight:600;
  padding:20px 26px;background:none;border:0}
.cardstage .cinfo .buff{padding:2px 22px 18px;text-align:center}
.cardstage .cinfo .buff .brank{font-size:11px;color:var(--gold2);letter-spacing:2px;margin-bottom:7px;font-weight:600}
.cardstage .cinfo .buff .brank::before{content:"⚜ ";opacity:.8}
.cardstage .cinfo .buff .bfunc{display:inline-block;font-size:19px;font-weight:800;letter-spacing:4px;color:var(--gold);
  margin-bottom:6px;filter:drop-shadow(0 0 12px rgba(255,230,168,.45))}
.cardstage .cinfo .buff .bfdesc{font-size:13px;line-height:1.7;color:var(--gold);letter-spacing:.2px}
/* —— 操作区 —— */
.cardstage .ops{width:100%;max-width:340px;margin-top:18px;display:flex;flex-direction:column;gap:12px}
.cardstage .cbtn{width:100%;padding:15px;border:0;border-radius:14px;font-size:15.5px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:.18s;display:block;margin:0}
.cardstage .btn-ghost{background:rgba(201,168,255,.08);border:1px solid var(--line);color:var(--gold)}
.cardstage .btn-ghost:active{background:rgba(201,168,255,.16)}
.cardstage .btn-ghost.dead{opacity:.32;cursor:default;pointer-events:none}
.cardstage .btn-gold{background:linear-gradient(120deg,#c9a8ff,#ffe6a8 60%,#e8c25a);color:#1a1530;
  box-shadow:0 6px 22px rgba(201,168,255,.35);animation:cardGlowPulse 2.4s ease-in-out infinite}
@keyframes cardGlowPulse{0%,100%{box-shadow:0 6px 20px rgba(201,168,255,.3),0 0 14px 1px rgba(255,230,168,.3)}
  50%{box-shadow:0 8px 26px rgba(201,168,255,.4),0 0 34px 8px rgba(255,230,168,.62)}}
.cardstage .btn-gold:active{opacity:.85}

/* ===== 登录开关（在后台代码里定，用户无感）=====
 * REQUIRE_LOGIN_DEFAULT = true  → 登录模式：用户打开干净网址，右上角即「登入」，解读前需登录(攒注册)。

 * URL ?login=0 / ?login=1 仅留作我们临时测试用，不对用户暴露、不必记。 */
const REQUIRE_LOGIN_DEFAULT = true;   // ← 救急开关：改成 false 即全站免登录

// 当前登录用户(null=未登录)
let _curUser = null;
async function refreshUser(){
  if(!sb) return null;
  // ① 先读 supabase 自己的 session（邮箱登录走这条，正常落盘）
  try{
    const {data:s}=await sb.auth.getSession();
    if(s&&s.session&&s.session.user){ _curUser=s.session.user; updateAcctBadge(); return _curUser; }
  }catch(_){}
  // ② supabase 没恢复出来 → 用我们短信登录时存的备份 token 重新 setSession 补回
  //    （Safari 下手动 setSession 注入的短信 session 不落盘，这是邮箱登录没有、短信登录才有的问题）
  try{
    const bak=localStorage.getItem("xuanji-auth-bak");
    if(bak){
      const {at,rt}=JSON.parse(bak);
      if(at&&rt){
        const {data,error}=await sb.auth.setSession({access_token:at, refresh_token:rt});
        if(!error&&data&&data.user){ _curUser=data.user; updateAcctBadge(); return _curUser; }
        // 🔴只在确认 token 真失效时才删备份；网络/服务临时不可达(如部署中)绝不删——
        //   否则部署那几十秒里误删好token,用户被迫重登且再也回不来(这是"偶发要重登"的真凶)。
        //   token失效特征:错误信息含 invalid/expired/jwt/refresh 等;网络错(failed to fetch/超时)则保留备份。
        if(error){
          const m=((error&&error.message)||"").toLowerCase();
          const tokenDead=/invalid|expired|jwt|refresh|not\s*found|revoked|bad_jwt/.test(m);
          if(tokenDead){ localStorage.removeItem("xuanji-auth-bak"); }
          // 网络类错误:啥都不删,保留备份,本轮就当未登录,下次网络好了还能恢复
        }
      }
    }
  }catch(_){}
  // ③ 都没有 → 回退网络校验
  try{ const {data}=await sb.auth.getUser(); _curUser=(data&&data.user)?data.user:null; }catch(_){ _curUser=null; }
  updateAcctBadge();
  return _curUser;
}
// 存盘：把登录用户这张盘(出生信息+盘数据+解读)存进 Supabase charts 表(静默)
async function saveChartToSupabase(N, reading){
  try{
    if(!sb || !_curUser || !N) return;
    const m=N.meta||{};
    const birth_meta={ y:m.y, mo:m.mo, d:m.d, h:m.h, mi:m.mi, tz:m.tz, lat:m.lat, lon:m.lon, city:m.city, sex:m.sex };
    const chart_data={
      planets:(N.planets||[]).map(p=>({n:p.n,sign:p.sign,deg:p.deg,house:p.house,rx:p.rx})),
      angles:N.angles, points:N.points, aspects:(N.asp||[]).map(x=>x.t)
    };
    await sb.from("charts").insert({ user_id:_curUser.id, email:_curUser.email, birth_meta, chart_data, reading:(reading||"").slice(0,8000) });
  }catch(_){ /* 存盘静默,失败不打扰用户 */ }
}
// 右上角账号角标：登录后显示登出；免登录模式(REQUIRE_LOGIN=false)且未登录时整个隐藏，用户碰不到会发链接的登录入口
function updateAcctBadge(){
  const badge=document.getElementById("acctBadge");
  const btn=document.getElementById("acctBtn"); if(!btn) return;
  // 免登录且未登录 → 藏掉角标（手机号登录上线/开关打开后自动恢复）
  if(badge) badge.style.display = (!REQUIRE_LOGIN && !_curUser) ? "none" : "flex";
  btn.textContent = _curUser ? "登出" : "登入";
}
// 绑定登出 + 页面加载即检查登录态
(function initAcct(){
  const bind=()=>{
    const btn=document.getElementById("acctBtn");
    if(btn) btn.onclick=async()=>{
      if(_curUser){ if(sb) await sb.auth.signOut(); try{localStorage.removeItem("xuanji-auth-bak");}catch(_){} _curUser=null; updateAcctBadge(); }   // 已登录→登出(连备份token一起清，否则刷新又被恢复)
      else { const u=await openLogin(); if(u){ _curUser=u; updateAcctBadge(); } }          // 未登录→弹登录
    };
  };
  if(document.readyState!=="loading") bind(); else document.addEventListener("DOMContentLoaded",bind);
  refreshUser(); // 进页面就检查:已登录则显示角标
})();

// 弹出登录浮层；返回 Promise，登录成功 resolve(user)，关闭则 resolve(null)
function openLogin(){
  return new Promise(resolve=>{
    let curPhone="";
    const ov=document.createElement("div");
    ov.id="loginOverlay";
    ov.innerHTML=`
      <div class="lg-mask"></div>
      <div class="lg-box">
        <button class="lg-close" title="关闭">×</button>
        <div class="lg-title">✦ 留一缕灵韵</div>
        <div class="lg-step" data-step="1">
          <div class="lg-sub" style="margin-bottom:14px">🗝️ 输入手机号，开启重生之门</div>
          <input class="lg-input" id="lgPhone" type="tel" inputmode="numeric" placeholder="你的手机号" autocomplete="tel" maxlength="11">
          <button class="lg-btn" id="lgSend">寄出灵符</button>
          <div class="lg-hint" id="lgHint1"></div>
        </div>
        <div class="lg-step hidden" data-step="2">
          <div class="lg-sub" style="margin-bottom:14px">🔮 命运之轮开始转动</div>
          <input class="lg-input" id="lgCode" type="text" inputmode="numeric" placeholder="输入收到的灵符（验证码）" maxlength="6">
          <button class="lg-btn" id="lgVerify">验符入阁</button>
          <div class="lg-hint" id="lgHint2"></div>
          <div class="lg-resend" id="lgResend">重新寄出灵符</div>
          <div class="lg-back" id="lgBack">← 换个手机号</div>
        </div>
      </div>`;
    document.body.appendChild(ov);
    const $=id=>ov.querySelector(id);
    const setH=(el,msg,cls)=>{ el.className="lg-hint "+(cls||""); el.textContent=msg; };
    const goStep=n=>{ ov.querySelectorAll(".lg-step").forEach(s=>s.classList.add("hidden")); ov.querySelector('.lg-step[data-step="'+n+'"]').classList.remove("hidden"); };
    let cdTimer=null;  // 60秒重发倒计时句柄
    const close=(u)=>{ clearInterval(cdTimer); ov.remove(); resolve(u||null); };
    $(".lg-close").onclick=()=>close(null);
    $(".lg-mask").onclick=()=>close(null);
    // —— 60秒重发倒计时（防狂点撞 Supabase 限流被默默丢，反而更收不到）——
    const startCountdown=()=>{
      const b=$("#lgResend"); if(!b) return;
      clearInterval(cdTimer); let left=60;
      b.classList.add("disabled"); b.textContent=left+"秒后可重发";
      cdTimer=setInterval(()=>{
        left--;
        if(left<=0){ clearInterval(cdTimer); cdTimer=null; b.classList.remove("disabled"); b.textContent="重新寄出灵符"; }
        else b.textContent=left+"秒后可重发";
      },1000);
    };
    // —— 发码逻辑（首发/重发共用）：调后端 /api/sms/send（阿里云发码）——
    const doSend=async(firstTime)=>{
      const phone=$("#lgPhone").value.trim();
      const hintEl=firstTime?$("#lgHint1"):$("#lgHint2");
      if(!/^1[3-9]\d{9}$/.test(phone)){ setH($("#lgHint1"),"手机号看着不太对呢","err"); return false; }
      if(firstTime){ $("#lgSend").disabled=true; setH($("#lgHint1"),"灵符飞往你的手机中…","wait"); }
      else setH($("#lgHint2"),"灵符再次寄往你的手机中…","wait");
      let r;
      try{
        const resp=await fetch("/api/sms/send",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({phone}) });
        r=await resp.json();
      }catch(_){ r={ok:false,error:"灵符一时未送达，稍候再试"}; }
      if(firstTime) $("#lgSend").disabled=false;
      // 🔴后端已是脱敏中文(含"操作太频繁/今日上限")，直接透传，绝不露技术字眼
      if(!r||!r.ok){ setH(hintEl,(r&&r.error)||"灵符一时未送达，稍候再试","err"); return false; }
      curPhone=phone;
      if(firstTime){ goStep(2); $("#lgCode").focus(); }
      setH($("#lgHint2"),"灵符已发至 "+phone+"（请查收短信）","wait");
      startCountdown();
      return true;
    };
    $("#lgSend").onclick=()=>doSend(true);
    $("#lgResend").onclick=()=>{ if(!$("#lgResend").classList.contains("disabled")) doSend(false); };
    // —— 验码逻辑：调后端 /api/sms/verify，拿回 session 写入 Supabase 客户端 ——
    $("#lgVerify").onclick=async()=>{
      const code=$("#lgCode").value.trim();
      if(code.length<6){ setH($("#lgHint2"),"请输入完整灵符","err"); return; }
      $("#lgVerify").disabled=true; setH($("#lgHint2"),"验符中…","wait");
      let r;
      try{
        const resp=await fetch("/api/sms/verify",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({phone:curPhone,code}) });
        r=await resp.json();
      }catch(_){ r={ok:false}; }
      if(!r||!r.ok||!r.session){ $("#lgVerify").disabled=false; setH($("#lgHint2"),(r&&r.error)||"灵符不符或已过期，再试试","err"); return; }
      // 用后端换来的 session 写入 supabase 客户端，之后存盘/读功德才认得登录态
      if(sb){
        const {data,error}=await sb.auth.setSession({ access_token:r.session.access_token, refresh_token:r.session.refresh_token });
        if(error||!data||!data.user){ $("#lgVerify").disabled=false; setH($("#lgHint2"),"入阁时灵韵一时未稳，再试试","err"); return; }
        // 双保险：把 token 存进我们自己的独立备份 key（不依赖 supabase 内部格式）。
        // Safari/ITP 下 setSession 的内部持久化可能不落盘，刷新即丢；启动时若 supabase 没恢复，就用这份备份 setSession 补回。
        try{
          localStorage.setItem("xuanji-auth-bak", JSON.stringify({ at:r.session.access_token, rt:r.session.refresh_token }));
        }catch(_){}
        clearInterval(cdTimer); _curUser=data.user; close(data.user); return;
      }
      $("#lgVerify").disabled=false; setH($("#lgHint2"),"灵阁一时未醒，请刷新再试","err");
    };
    $("#lgBack").onclick=()=>{ clearInterval(cdTimer); $("#lgResend").classList.remove("disabled"); $("#lgResend").textContent="重新寄出灵符"; goStep(1); };
    setTimeout(()=>$("#lgPhone").focus(),50);
  });
}

const A=window.Astronomy;
const SIGNS=["白羊","金牛","双子","巨蟹","狮子","处女","天秤","天蝎","射手","摩羯","水瓶","双鱼"];
const ELEMENT={白羊:"火",狮子:"火",射手:"火",金牛:"土",处女:"土",摩羯:"土",双子:"风",天秤:"风",水瓶:"风",巨蟹:"水",天蝎:"水",双鱼:"水"};
const BODIES=[["太阳",A.Body.Sun],["月亮",A.Body.Moon],["水星",A.Body.Mercury],["金星",A.Body.Venus],["火星",A.Body.Mars],["木星",A.Body.Jupiter],["土星",A.Body.Saturn],["天王",A.Body.Uranus],["海王",A.Body.Neptune],["冥王",A.Body.Pluto]];
const ASPECTS=[[0,"合",8,""],[60,"六合",4,"good"],[90,"刑",6,"hard"],[120,"拱",6,"good"],[180,"冲",8,"hard"]];

function lon(b,date){let e=A.Ecliptic(A.GeoVector(b,date,true)).elon;return e<0?e+360:e;}
function isRx(b,date){ // 用前后6小时判断顺逆
  if(b===A.Body.Sun||b===A.Body.Moon)return false;
  const t1=new Date(date.getTime()-6*3600e3),t2=new Date(date.getTime()+6*3600e3);
  let a=lon(b,t1),c=lon(b,t2),d=c-a; if(d>180)d-=360; if(d<-180)d+=360; return d<0;
}
function pos(date){return BODIES.map(([n,b])=>{const L=lon(b,date),s=Math.floor(L/30),deg=L-s*30;return{n,sign:SIGNS[s],deg:Math.floor(deg),min:Math.floor((deg%1)*60),rx:isRx(b,date),L};});}
function aspects(date){const ps=pos(date),out=[];for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){let d=Math.abs(ps[i].L-ps[j].L)%360;if(d>180)d=360-d;for(const[a,nm,orb,cls]of ASPECTS){if(Math.abs(d-a)<=orb){out.push({t:`${ps[i].n}${nm}${ps[j].n}`,cls});break;}}}return out;}

// 扫描换座 & 新月满月
function scanTransits(start,days,skipMoon){const ev=[];for(const[n,b]of BODIES){if(skipMoon&&b===A.Body.Moon)continue;let prev=Math.floor(lon(b,start)/30);for(let k=1;k<=days;k++){const d=new Date(start.getTime()+k*864e5);const cur=Math.floor(lon(b,d)/30);if(cur!==prev){ev.push({date:d,txt:`${n} 进入 ${SIGNS[cur]}座`});prev=cur;}}}return ev;}
function scanMoons(start,days){const ev=[],seen=new Set();for(let k=0;k<=days;k++){const d=new Date(start.getTime()+k*864e5);const sun=lon(A.Body.Sun,d),moon=lon(A.Body.Moon,d);let diff=(moon-sun+360)%360;if(diff<7||diff>353){const s=SIGNS[Math.floor(sun/30)];if(!seen.has("新"+s)){ev.push({date:d,txt:`🌑 新月在 ${s}座`});seen.add("新"+s);}}else if(Math.abs(diff-180)<7){const s=SIGNS[Math.floor(moon/30)];if(!seen.has("满"+s)){ev.push({date:d,txt:`🌕 满月在 ${s}座`});seen.add("满"+s);}}}return ev;}
const md=d=>`${d.getMonth()+1}/${d.getDate()}`;

function planetRows(ps){return ps.map(p=>`<div class="planet"><span class="pname">${p.n}</span><span class="ppos">${p.sign} ${p.deg}°${String(p.min).padStart(2,'0')}'</span>${p.rx?'<span class="rx">℞ 逆行</span>':''}</div>`).join('');}
function aspectTags(as){return as.map(a=>`<span class="asp-tag ${a.cls?'asp-'+a.cls:''}">${a.t}</span>`).join('');}

// 把"本地出生时间+时区"换成UTC的Date(必用Date.UTC, 不让浏览器按设备时区瞎猜)
function toUTC(y,mo,d,h,mi,tzOffset){
  return new Date(Date.UTC(y,mo-1,d,h,mi)-tzOffset*3600*1000);
}
// 中国夏令时(1986-1991, 仅此6年实行过): 钟拨快1小时, 拨快的钟面时间需减1h才是标准时。
// 起止日期已逐年对齐 IANA tz database(Asia/Shanghai)的官方转换记录, 分秒级权威:
//   开始/结束均为当日"凌晨02:00"切换。表项格式 [[开始日,开始月],[结束日,结束月]]。
//   1986(首年特殊)5/4起·9/14止；1987 4/12·9/13；1988 4/17·9/11；
//   1989 4/16·9/17；1990 4/15·9/16；1991 4/14·9/15。
// 返回"需减去的小时数"(0或1)。h为钟面小时(用于精确处理边界日02:00切换)。
const CN_DST={1986:[[5,4],[14,9]],1987:[[12,4],[13,9]],1988:[[17,4],[11,9]],1989:[[16,4],[17,9]],1990:[[15,4],[16,9]],1991:[[14,4],[15,9]]};
function cnDstAdjust(y,mo,d,h){
  if(!CN_DST[y]) return 0;
  const [[sd,sm],[ed,em]]=CN_DST[y];
  const cur=mo*100+d, st=sm*100+sd, en=em*100+ed;
  // 区间(开始日含, 结束日不含)内一律夏令时。
  if(cur>st && cur<en) return 1;
  // 边界日精确到02:00: 开始日 02:00 起拨快; 结束日 02:00 前仍夏令时(02:00拨回)。
  if(cur===st) return (h===undefined||h>=2) ? 1 : 0; // 02:00前钟未拨快
  if(cur===en) return (h!==undefined&&h<2) ? 1 : 0;  // 02:00前仍夏令时
  return 0;
}
// 均时差(equation of time, 分钟)。真太阳时与平太阳时之差, 最多约±16分。
// date为UTC, 用简化级数(对占星度级精度足够)。
function equationOfTime(date){
  const n=A.MakeTime(date).tt;               // 自J2000.0的天数(本库tt定义)
  const Ldeg=(280.460+0.9856474*n)%360;      // 太阳平黄经
  const gdeg=(357.528+0.9856003*n)%360;      // 平近点角
  const g=gdeg*Math.PI/180;
  const lambda=(Ldeg+1.915*Math.sin(g)+0.020*Math.sin(2*g))*Math.PI/180; // 真黄经
  const eps=obliquity(date)*Math.PI/180;
  // EoT(弧度)= L - atan2(cos e sin λ, cos λ) ... 标准公式
  let ra=Math.atan2(Math.cos(eps)*Math.sin(lambda),Math.cos(lambda)); // 太阳赤经(弧度)
  let raDeg=ra*180/Math.PI; raDeg=(raDeg%360+360)%360;
  let eotDeg=Ldeg-raDeg; if(eotDeg>180)eotDeg-=360; if(eotDeg<-180)eotDeg+=360;
  return eotDeg*4; // 1度=4分钟 → 返回分钟数
}
// 黄赤交角(度)。注意: 本库 MakeTime().tt = "相对J2000.0的天数"(不是儒略日)
function obliquity(date){
  const T=(A.MakeTime(date).tt)/36525; // 儒略世纪(自J2000)
  return 23.439291-0.0130042*T;
}
// 算上升ASC + 天顶MC (返回黄经0-360)
function calcAscMc(date,lat,lon_east){
  const gast=A.SiderealTime(date);            // 格林尼治视恒星时(小时)
  let ramc=(gast*15+lon_east)%360; if(ramc<0)ramc+=360;  // 本地恒星时=RAMC(度)
  const eps=obliquity(date);
  const rad=Math.PI/180, deg=180/Math.PI;
  const r=ramc*rad, e=eps*rad, phi=lat*rad;
  // MC
  let mc=Math.atan2(Math.sin(r),Math.cos(r)*Math.cos(e))*deg; mc=(mc%360+360)%360;
  // ASC (标准式, 含象限)
  let asc=Math.atan2(Math.cos(r), -(Math.sin(r)*Math.cos(e)+Math.tan(phi)*Math.sin(e)))*deg;
  asc=(asc%360+360)%360;
  return {asc,mc,ramc,eps};
}
// Placidus 宫位制(对标测测/笔记/主流中文占星)。返回12个宫头黄经[1宫..12宫]。
// 已用基准盘(1994/07/24 13:35 九江)逐宫校验, 与测测分秒级吻合。
function placidusCusps(ramcDeg,eps,lat,asc,mc){
  const rad=Math.PI/180,deg=180/Math.PI,e=eps*rad,phi=lat*rad;
  // 牛顿迭代求中间宫头(11,12,2,3)黄经
  function cusp(n){
    let hourAngleSign,F,seed;
    if(n===11){F=1/3;hourAngleSign=1;seed=30;}
    if(n===12){F=2/3;hourAngleSign=1;seed=60;}
    if(n===2){F=2/3;hourAngleSign=-1;seed=120;}
    if(n===3){F=1/3;hourAngleSign=-1;seed=150;}
    let lam=(ramcDeg+seed)%360;
    for(let i=0;i<100;i++){
      const l=lam*rad;
      const decl=Math.asin(Math.sin(e)*Math.sin(l));
      let RA=Math.atan2(Math.sin(l)*Math.cos(e),Math.cos(l))*deg; RA=(RA%360+360)%360;
      const ad=Math.acos(Math.max(-1,Math.min(1,-Math.tan(phi)*Math.tan(decl))))*deg; // 半昼弧
      const MD=hourAngleSign>0? F*ad : F*(180-ad);
      const targetRA=(ramcDeg+(hourAngleSign>0? MD : (180-MD)))%360;
      const diff=((RA-targetRA+540)%360)-180;
      if(Math.abs(diff)<1e-6) break;
      lam=((lam-diff*0.5)%360+360)%360;
    }
    return lam;
  }
  const c11=cusp(11),c12=cusp(12),c2=cusp(2),c3=cusp(3);
  // [1..12]宫头: 1=asc,10=mc,对宫=+180
  return [asc,c2,c3,(mc+180)%360,(c11+180)%360,(c12+180)%360,(asc+180)%360,(c2+180)%360,(c3+180)%360,mc,c11,c12];
}
const SIGN=L=>SIGNS[Math.floor(((L%360)+360)%360/30)];
const DEGIN=L=>{const x=((L%360)+360)%360; const d=x-Math.floor(x/30)*30; return {deg:Math.floor(d),min:Math.floor((d%1)*60)};};

// 进阶点位(纯数学, 不依赖库的小行星星历)。date为UTC。
// 平黑月莉莉丝(月亮远地点平黄经)+ 平北交点(月亮升交点平黄经)。
// 本库 MakeTime().tt 已是"相对J2000.0的天数", 直接/36525得儒略世纪(不再减2451545)
function julianCenturies(date){ return A.MakeTime(date).tt/36525; }
// 平北交点黄经(度): 标准公式(逆行, 约18.6年一周)
function meanNode(date){
  const T=julianCenturies(date);
  let om=125.04452-1934.136261*T+0.0020708*T*T+T*T*T/450000;
  return ((om%360)+360)%360;
}
// 平黑月莉莉丝(月亮远地点黄经, 度)= 月亮近地点黄经+180
function meanLilith(date){
  const T=julianCenturies(date);
  // 月亮近地点黄经 ϖ (perigee, 度)
  let perigee=83.3532465+4069.0137287*T-0.0103200*T*T-T*T*T/80053+T*T*T*T/18999000;
  let lilith=perigee+180;
  return ((lilith%360)+360)%360;
}

// 完整本命盘
function computeNatal(inp){
  // ① 夏令时修正(1986-91中国): 钟面时间拨快了1h, 减回真实民用时间(影响真实UTC瞬间, 必须做)
  const dstH=cnDstAdjust(inp.y,inp.mo,inp.d,inp.h);
  const utc=toUTC(inp.y,inp.mo,inp.d,inp.h-dstH,inp.mi,inp.tz);
  // 注: 现代占星(含测测)用民用钟表时间直接排盘, 行星位置/上升由真实UTC瞬间决定,
  //     "真太阳时·均时差"不并入计算(那会让行星偏移、反与测测不符)。
  //     均时差仅作"当地真太阳时"参考显示, 不参与排盘。
  const eotMin=equationOfTime(utc);
  const {asc,mc,ramc,eps}=calcAscMc(utc,inp.lat,inp.lon);
  const ascSign=Math.floor(asc/30);
  // Placidus 宫头(对标测测主流)。落宫=判断黄经落在哪两个宫头之间。
  const cusps=placidusCusps(ramc,eps,inp.lat,asc,mc);
  const houseOf=L=>{
    L=((L%360)+360)%360;
    for(let h=0;h<12;h++){
      const a=((cusps[h]%360)+360)%360, b=((cusps[(h+1)%12]%360)+360)%360;
      const span=(b-a+360)%360, off=(L-a+360)%360;
      if(off<span) return h+1;
    }
    return 12;
  };
  const planets=BODIES.map(([n,b])=>{
    const L=lon(b,utc); const dm=DEGIN(L);
    return {n,sign:SIGN(L),signIdx:Math.floor(((L%360)+360)%360/30),deg:dm.deg,min:dm.min,house:houseOf(L),rx:isRx(b,utc),L};
  });
  // 凯龙星(Chiron;伤痛与疗愈)——保留在 planets 里，照旧参与解读/相位/元素。
  // 🔴取值源优先用 asteroid-ephem.js 的 chiron(对测测仅差~8角分),旧 Moshier 库 chironLon 差~54角分。
  //    凯龙轨道偏心率高,旧库拟合差;asteroid-ephem 同一套四小行星库顺带算的 chiron 准得多。
  //    降级:asteroid-ephem 没加载/报错时退回 chironLon,保证不崩。
  {
    let cL=null, cRx=false;
    if(typeof asteroidEphem==="function"){
      try{ const _c=asteroidEphem(utc).chiron; if(_c&&isFinite(_c.L)){ cL=_c.L; cRx=!!_c.rx; } }catch(_){}
    }
    if(cL===null && typeof chironLon==="function"){ try{ cL=chironLon(utc); }catch(_){} }
    if(cL!==null){
      const cdm=DEGIN(cL);
      planets.push({n:"凯龙",sign:SIGN(cL),signIdx:Math.floor(((cL%360)+360)%360/30),deg:cdm.deg,min:cdm.min,house:houseOf(cL),rx:cRx,L:cL});
    }
  }
  // ===== 四小行星(谷神/智神/婚神/灶神)：纯新增，独立成区，只上盘面，不进解读、不进相位、不进三个群运营tab =====
  // 精度已对测测校验(三盘12体落座100%/度差≤17'/末度临界与逆行全对)。asteroid-ephem.js 提供。
  const asteroids=[];
  if(typeof asteroidEphem==="function"){
    try{
      const a=asteroidEphem(utc);
      const _pushAst=(name,L,rx)=>{const dm=DEGIN(L);asteroids.push({n:name,sign:SIGN(L),signIdx:Math.floor(((L%360)+360)%360/30),deg:dm.deg,min:dm.min,house:houseOf(L),rx:!!rx,L:L});};
      _pushAst("谷神", a.ceres.L,  a.ceres.rx);
      _pushAst("智神", a.pallas.L, a.pallas.rx);
      _pushAst("婚神", a.juno.L,   a.juno.rx);
      _pushAst("灶神", a.vesta.L,  a.vesta.rx);
    }catch(e){ /* 小行星算失败不影响主盘 */ }
  }
  // 本命相位(复用ASPECTS逻辑)
  const asp=[];
  for(let i=0;i<planets.length;i++)for(let j=i+1;j<planets.length;j++){
    let dd=Math.abs(planets[i].L-planets[j].L)%360; if(dd>180)dd=360-dd;
    for(const[a,nm,orb,cls]of ASPECTS){if(Math.abs(dd-a)<=orb){asp.push({t:`${planets[i].n}${nm}${planets[j].n}`,cls});break;}}
  }
  // 四轴
  const dm_asc=DEGIN(asc),dm_mc=DEGIN(mc),dsc=(asc+180)%360,ic=(mc+180)%360,dm_dsc=DEGIN(dsc),dm_ic=DEGIN(ic);
  const angles={
    asc:{sign:SIGN(asc),deg:dm_asc.deg,min:dm_asc.min,L:asc},
    mc:{sign:SIGN(mc),deg:dm_mc.deg,min:dm_mc.min,L:mc},
    dsc:{sign:SIGN(dsc),deg:dm_dsc.deg,min:dm_dsc.min,L:dsc},
    ic:{sign:SIGN(ic),deg:dm_ic.deg,min:dm_ic.min,L:ic}
  };
  // Placidus 12宫(每宫头带具体度数)
  const houses=[];for(let k=0;k<12;k++){const cdm=DEGIN(cusps[k]);houses.push({num:k+1,sign:SIGN(cusps[k]),deg:cdm.deg,min:cdm.min,L:cusps[k]});}
  // 进阶点位: 北交点/南交点/莉莉丝(纯数学算)
  const nodeL=meanNode(utc), lilithL=meanLilith(utc), southL=(nodeL+180)%360;
  // —— 三虚点(纯数学, 复用 calcAscMc 同一套数学; 已用黄金基准盘逐项校对 ≤3角分) ——
  // ① 东方点 East Point: 把纬度当作 0(赤道) 算出的上升点黄经。基准盘校对差 0.6'。
  const eastL=calcAscMc(utc,0,inp.lon).asc;
  // ② 宿命点 Vertex: 黄道与卯酉圈(prime vertical)在地平西侧的交点。
  //    标准做法=用余纬(90-lat)当纬度、并把 RAMC 换成对侧子午线(RAMC+180), 套上升公式。基准盘校对差 2.5'。
  const vertexL=(function(){
    const rad=Math.PI/180,deg=180/Math.PI;
    const r=((ramc+180)%360)*rad, e=eps*rad, phi=(90-inp.lat)*rad;
    let v=Math.atan2(Math.cos(r), -(Math.sin(r)*Math.cos(e)+Math.tan(phi)*Math.sin(e)))*deg;
    return (v%360+360)%360;
  })();
  // ③ 福点 Part of Fortune: 必须按日/夜盘动态选公式(这是占星标准做法, 测测也如此)。
  //    日盘(太阳在地平线之上=第7~12宫): ASC + 月亮 - 太阳
  //    夜盘(太阳在地平线之下=第1~6宫):  ASC + 太阳 - 月亮
  //    判据用 houseOf(sunL): 7~12 宫=日盘。曾误把一张夜生盘对齐后写死夜公式,
  //    导致日生盘(如太阳9宫)算错(白羊26° vs 正确双子2°), 现已改回动态。
  const sunL=planets[0].L, moonL=planets[1].L;
  const sunHouse=houseOf(sunL);
  const isDayChart=(sunHouse>=7&&sunHouse<=12);
  const fortuneL=isDayChart
    ? ((asc+moonL-sunL)%360+360)%360   // 日盘
    : ((asc+sunL-moonL)%360+360)%360;  // 夜盘
  const mkPt=(n,L,rx)=>{const dm=DEGIN(L);return {n,sign:SIGN(L),deg:dm.deg,min:dm.min,house:houseOf(L),rx:!!rx,L};};
  // 北交/南交是平均运动逆行点(永远℞,与测测一致)
  const points=[ mkPt("北交点",nodeL,true), mkPt("南交点",southL,true), mkPt("莉莉丝",lilithL),
                 mkPt("福点",fortuneL), mkPt("宿命点",vertexL), mkPt("东方点",eastL) ];
  return {meta:inp,utc,planets,asteroids,asp,angles,houses,points,ascSign,cusps,dstH,eotMin};
}

// 出生时间·金色滚轮（年/月/日/时/分 五列合一，弹底部浮层）
const DT_H=40;                       // 每行高度，与 .dt-col .it 的 height 一致
const dtSel={y:0,m:0,d:0,h:0,mi:0};  // 当前选中值；0 表示用户尚未选过
let dtPicked=false;                  // 用户是否已确认过一次
let dtProg=false;                    // true=程序在定位滚轮(非用户拨动)，期间不点亮确定
function dtRange(a,b,suf){const r=[];for(let i=a;i<=b;i++)r.push({v:i,t:i+suf});return r;}
function dtDaysIn(y,m){return new Date(y,m,0).getDate();}
function initDateSelect(){
  const wheels=document.getElementById("dtWheels"); if(!wheels) return;
  // 默认值：1995-01-01 12:00（中间档，给个起手位）
  if(!dtSel.y){dtSel.y=1995;dtSel.m=1;dtSel.d=1;dtSel.h=12;dtSel.mi=0;}
  const ranges={
    y:dtRange(1950,2025,"年"), m:dtRange(1,12,"月"), d:dtRange(1,31,"日"),
    h:dtRange(0,23,"时"), mi:dtRange(0,59,"分")
  };
  const cols={};
  wheels.querySelectorAll(".dt-col").forEach(col=>{cols[col.dataset.k]=col;});
  function build(k){
    const col=cols[k];
    const items=k==='d'?ranges.d.slice(0,dtDaysIn(dtSel.y,dtSel.m)):ranges[k];
    col.innerHTML='<div class="pad"></div>'+items.map(o=>`<div class="it" data-v="${o.v}">${o.t}</div>`).join('')+'<div class="pad"></div>';
    let idx=items.findIndex(o=>o.v===dtSel[k]); if(idx<0)idx=0;
    col.scrollTop=idx*DT_H; mark(col,idx);
    let t;
    col.onscroll=()=>{
      clearTimeout(t);
      const i=Math.round(col.scrollTop/DT_H); mark(col,i);
      t=setTimeout(()=>{
        col.scrollTo({top:i*DT_H,behavior:'smooth'});
        const its=col.querySelectorAll('.it'); if(its[i])dtSel[k]=+its[i].dataset.v;
        if(!dtProg) document.getElementById("dtOk").classList.add("ready"); // 仅用户拨动才点亮(程序定位不算)
        if(k==='y'||k==='m')build('d'); // 改年月→重算当月天数
      },90);
    };
  }
  function mark(col,i){col.querySelectorAll('.it').forEach((el,j)=>el.classList.toggle('sel',j===i));}
  ['y','m','d','h','mi'].forEach(build);

  const mask=document.getElementById("dtMask"),sheet=document.getElementById("dtSheet");
  function open(){
    mask.classList.add('on');sheet.classList.add('on');
    document.getElementById("dtOk").classList.remove("ready"); // 打开时素，拨动后才亮金（与其他浮层一致）
    dtProg=true;  // 标记：接下来的滚动是程序定位，不算用户拨动
    setTimeout(()=>{['y','m','d','h','mi'].forEach(k=>{
      const items=k==='d'?ranges.d.slice(0,dtDaysIn(dtSel.y,dtSel.m)):ranges[k];
      let idx=items.findIndex(o=>o.v===dtSel[k]); if(idx<0)idx=0; cols[k].scrollTop=idx*DT_H; mark(cols[k],idx);
    }); setTimeout(()=>dtProg=false,300);},60); // 定位滚动稳定后再放开，之后才认用户拨动
  }
  function close(){mask.classList.remove('on');sheet.classList.remove('on');}
  document.getElementById("dtPill").onclick=open;
  document.getElementById("dtCancel").onclick=close;
  mask.onclick=close;
  document.getElementById("dtOk").onclick=()=>{
    const p=n=>String(n).padStart(2,'0');
    document.getElementById("dtVal").textContent=`${dtSel.y}年${p(dtSel.m)}月${p(dtSel.d)}日 ${p(dtSel.h)}:${p(dtSel.mi)}`;
    document.getElementById("dtVal").classList.remove('ph');
    dtPicked=true; close();
  };
}

// 出生地·三级联动滚轮（省→市→区，复用 .dt-* 滚轮样式）
// 通用三级联动滚轮（出生地/现居地共用）
// cfg: {wheels,mask,sheet,pill,cancel,ok,val, placeholder, ids:[省,市,区], sel(状态对象)}
function makeCityPicker(cfg){
  const D=window.CITY_DATA||{};
  const wheels=document.getElementById(cfg.wheels); if(!wheels) return;
  const cols={}; wheels.querySelectorAll(".dt-col").forEach(col=>{cols[col.dataset.k]=col;});
  const sel=cfg.sel;
  const provs=Object.keys(D);
  const citiesOf=p=>p&&D[p]?Object.keys(D[p]):[];
  const distsOf=(p,c)=>p&&c&&D[p]&&D[p][c]?Object.keys(D[p][c]):[];
  function mark(col,i){col.querySelectorAll('.it').forEach((el,j)=>el.classList.toggle('sel',j===i));}
  function buildCol(k,items){
    const col=cols[k];
    col.innerHTML='<div class="pad"></div>'+items.map(o=>`<div class="it" data-v="${o}">${o}</div>`).join('')+'<div class="pad"></div>';
    let idx=items.indexOf(sel[k]); if(idx<0)idx=0;
    col.scrollTop=idx*DT_H; mark(col,idx);
    if(items.length) sel[k]=items[idx];
    let t;
    col.onscroll=()=>{
      clearTimeout(t);
      const i=Math.round(col.scrollTop/DT_H); mark(col,i);
      t=setTimeout(()=>{
        col.scrollTo({top:i*DT_H,behavior:'smooth'});
        const its=col.querySelectorAll('.it'); if(its[i])sel[k]=its[i].dataset.v;
        document.getElementById(cfg.ok).classList.add("ready"); // 拨动即点亮确定
        if(k==='prov'){ sel.city="";sel.dist=""; const cs=citiesOf(sel.prov); buildCol('city',cs); buildCol('dist',distsOf(sel.prov,cs[0]||"")); }
        if(k==='city'){ sel.dist=""; buildCol('dist',distsOf(sel.prov,sel.city)); }
      },90);
    };
  }
  function rebuildAll(){
    buildCol('prov',provs);
    const cs=citiesOf(sel.prov||provs[0]); if(!sel.prov)sel.prov=provs[0]||"";
    buildCol('city',cs); if(!sel.city)sel.city=cs[0]||"";
    buildCol('dist',distsOf(sel.prov,sel.city));
  }
  const mask=document.getElementById(cfg.mask),sheet=document.getElementById(cfg.sheet);
  function open(){ mask.classList.add('on');sheet.classList.add('on'); setTimeout(rebuildAll,60); }
  function close(){ mask.classList.remove('on');sheet.classList.remove('on'); }
  document.getElementById(cfg.pill).onclick=open;
  document.getElementById(cfg.cancel).onclick=close;
  mask.onclick=close;
  document.getElementById(cfg.ok).onclick=()=>{
    document.getElementById(cfg.ids[0]).value=sel.prov||"";
    document.getElementById(cfg.ids[1]).value=sel.city||"";
    document.getElementById(cfg.ids[2]).value=sel.dist||"";
    const txt=[sel.prov,sel.city,sel.dist].filter(Boolean).join(" ");
    const valEl=document.getElementById(cfg.val);
    valEl.textContent=txt||cfg.placeholder;
    if(txt)valEl.classList.remove('ph');
    cfg.onpick&&cfg.onpick(!!txt); close();
  };
}

function doCalcNatal(){
  if(!dtPicked){alert("请先选出生日期时间");return;}
  const p2=n=>String(n).padStart(2,'0');
  const dateStr=`${dtSel.y}-${p2(dtSel.m)}-${p2(dtSel.d)}`;
  const timeStr=`${p2(dtSel.h)}:${p2(dtSel.mi)}`;
  const [y,mo,d]=dateStr.split("-").map(Number);
  const [h,mi]=timeStr.split(":").map(Number);
  const tz=parseFloat(document.getElementById("bTz").value);
  const D=window.CITY_DATA||{};
  const prov=document.getElementById("bProv").value,city=document.getElementById("bCity2").value,dist=document.getElementById("bDist").value;
  let lat,lon,cityName="";
  if(prov&&city&&dist&&D[prov]&&D[prov][city]&&D[prov][city][dist]){
    [lat,lon]=D[prov][city][dist]; cityName=`${prov}${city}${dist}`;
  }else{
    // 兜底: 手填经纬度(海外/找不到)
    lat=parseFloat(document.getElementById("bLat").value);
    lon=parseFloat(document.getElementById("bLon").value);
    if(isNaN(lat)||isNaN(lon)){alert("请选择完整的省/市/区，或点“手填经纬度”输入(海外出生)");return;}
    cityName=`${lat.toFixed(2)},${lon.toFixed(2)}`;
  }
  if(Math.abs(lat)>66){alert("高纬度地区上升点计算精度会下降，结果仅供参考");}
  // 现居地、人格类型必填（先攒数据，后续参与行运/解读）
  if(!resPicked){alert("请选择现居地");return;}
  // MBTI 选填：没选也照常排盘（选了更好，先攒数据；后续接星座×MBTI解读）
  const sex=document.querySelector("#bSex .opt.on").dataset.v;
  const inp={y,mo,d,h,mi,tz,lat,lon,city:cityName||`${lat},${lon}`,sex};
  natalResult=computeNatal(inp);
  // 自报MBTI(面具)只悄悄存后台·不对外显示
  try{const mb=document.getElementById("bMbti"); if(mb&&mb.value) console.log("[后台·自报MBTI·面具不对外]",mb.value);}catch(e){}
  renderMbtiResult(natalResult);          // ← 第一个出来的:星盘测MBTI(底色→重生)
  renderNatalResult(natalResult);         // 星盘解析(先渲染好,但藏起来当钩子)
  buildNatalPrompt(natalResult);
  document.getElementById("natalResult").style.display="none";  // 🔴照见时不让看星盘,扣后面
  setTimeout(()=>{const r=document.getElementById("mbtiResult"); if(r) r.scrollIntoView({behavior:"smooth",block:"start"});},100);
}

// 向下引导箭头:柔金呼吸浮动,点击平滑滚到解读卡;解读卡进入视口即淡出收起,本次排盘内不再回来
function setupScrollGuide(){
  const guide=document.getElementById("scrollGuide");
  const card=document.querySelector("#natalResult .read-card");
  if(!guide||!card) return;
  // 点箭头平滑滚到解读卡
  guide.addEventListener("click",()=>card.scrollIntoView({behavior:"smooth",block:"center"}));
  const dismiss=()=>{
    if(guide.classList.contains("fade-out")) return;
    guide.classList.add("fade-out");
    setTimeout(()=>{ if(guide.parentNode) guide.parentNode.removeChild(guide); },650);
  };
  // 箭头自己滚出视野(用户已往下看解读)才收起，避免与解读卡同屏时秒淡出
  if("IntersectionObserver" in window){
    let seen=false; // 先确认箭头进入过视野，再在它离开时才淡出
    const io=new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){ seen=true; }
        else if(seen){ dismiss(); io.disconnect(); }
      });
    },{threshold:.6});
    io.observe(guide);
  }
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// 轻量 Markdown 渲染(先 esc 防 XSS, 再按行解析标题/列表/引用/分隔, 行内处理加粗/斜体)
function mdToHtml(src){
  // 行内: 加粗 **x** / 斜体 *x* (在已 esc 的文本上做, 安全)
  const inline=t=>esc(t)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*([^*]|$)/g,'$1<em>$2</em>$3');
  const lines=src.split('\n');
  let html='', inList=false;
  const closeList=()=>{ if(inList){html+='</ul>';inList=false;} };
  for(let raw of lines){
    const line=raw.replace(/\s+$/,'');
    if(/^\s*$/.test(line)){ closeList(); continue; }
    let m;
    if(/^\s*---+\s*$/.test(line)){ closeList(); html+='<hr class="md-hr">'; continue; }
    if((m=line.match(/^(#{1,6})\s+(.*)$/))){ closeList(); const lv=Math.min(m[1].length,4); html+=`<div class="md-h md-h${lv}">${inline(m[2])}</div>`; continue; }
    if((m=line.match(/^\s*>\s?(.*)$/))){ closeList(); html+=`<blockquote class="md-q">${inline(m[1])}</blockquote>`; continue; }
    if((m=line.match(/^\s*[-*]\s+(.*)$/))){ if(!inList){html+='<ul class="md-ul">';inList=true;} html+=`<li>${inline(m[1])}</li>`; continue; }
    closeList(); html+=`<p class="md-p">${inline(line)}</p>`;
  }
  closeList();
  return html;
}

function panFingerprint(N){
  const m=N.meta;
  const s=`${m.y}-${m.mo}-${m.d}-${m.h}-${m.mi}-${m.tz}-${(m.lat||0).toFixed(2)}-${(m.lon||0).toFixed(2)}-${m.sex}`;
  let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))>>>0; }
  return "p"+h.toString(36);
}

function lifePathNumber(y,mo,d){
  let s=String(y)+String(mo)+String(d);
  let sum=s.split("").reduce((a,c)=>a+(+c),0);
  while(sum>9 && sum!==11 && sum!==22 && sum!==33){ sum=String(sum).split("").reduce((a,c)=>a+(+c),0); }
  return sum;
}
// ===== 八字+方位(全JS算死,绝不让模型碰生克/计算)。处理晚子时(23点后算次日)。=====
const _GAN=["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const _ZHI=["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const _GWX={甲:"木",乙:"木",丙:"火",丁:"火",戊:"土",己:"土",庚:"金",辛:"金",壬:"水",癸:"水"};
const _KE={木:"土",火:"金",土:"水",金:"木",水:"火"}; // 我克者=财
const _WXFANG={木:"东方",火:"南方",土:"西南方",金:"西方",水:"北方"};
const _ELFANG={火:"南方",土:"西南方",风:"东方",水:"北方"};
function _dayIdx(y,mo,d){const base=Date.UTC(1900,0,1);const cur=Date.UTC(y,mo-1,d);const days=Math.round((cur-base)/86400000);return ((10+days)%60+60)%60;}
function baziCalc(y,mo,d,hour){
  let dy=y,dmo=mo,dd=d;
  if(hour>=23){const nx=new Date(Date.UTC(y,mo-1,d+1));dy=nx.getUTCFullYear();dmo=nx.getUTCMonth()+1;dd=nx.getUTCDate();}
  let yy=y; if(mo<2||(mo===2&&d<4))yy=y-1;
  const yIdx=((yy-1984)%60+60)%60; const yp=_GAN[yIdx%10]+_ZHI[yIdx%12];
  const dIdx=_dayIdx(dy,dmo,dd); const dp=_GAN[dIdx%10]+_ZHI[dIdx%12];
  const jieDay=[0,0,4,6,5,6,6,8,8,8,8,7,7]; let mIdx=mo-2; if(d<jieDay[mo])mIdx-=1; mIdx=(mIdx%12+12)%12;
  const mZhi=["寅","卯","辰","巳","午","未","申","酉","戌","亥","子","丑"][mIdx];
  const wuhu=[2,4,6,8,0]; const mp=_GAN[(wuhu[_GAN.indexOf(yp[0])%5]+mIdx)%10]+mZhi;
  const zhiIdx=Math.floor(((hour+1)%24)/2); const wushu=[0,2,4,6,8];
  const hp=_GAN[(wushu[_GAN.indexOf(dp[0])%5]+zhiIdx)%10]+_ZHI[zhiIdx];
  return {yp,mp,dp,hp};
}
function caiFang(dayGan){return _WXFANG[_KE[_GWX[dayGan]]];}          // 财位=日主克者方位
function luckyFang(el){const o=Object.entries(el).sort((a,b)=>a[1]-b[1]);return _ELFANG[o[0][0]];} // 幸运方位=星盘最缺元素方位
